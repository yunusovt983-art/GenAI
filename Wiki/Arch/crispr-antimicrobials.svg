<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 806" role="img">
<title>CRISPR-фаги против кариесогенных бактерий</title>
<desc>Каскад: инженерный бактериофаг доставляет CRISPR-Cas, точечно распознаёт S. mutans, впрыскивает гид-РНК и Cas, который разрезает геном патогена и убивает только его; полезные бактерии не затронуты, микробиом восстанавливается.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="806" fill="#FFFFFF"/>
<text class="ttl" x="340" y="28" text-anchor="middle" fill="#4A1B0C">CRISPR-фаги против кариеса</text>

<line x1="360" y1="98" x2="360" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="325" y1="196" x2="240" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="196" x2="492" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="225" y1="298" x2="225" y2="330" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="225" y1="390" x2="225" y2="422" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="225" y1="488" x2="225" y2="520" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="225" y1="586" x2="225" y2="618" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="240" y1="676" x2="300" y2="710" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="505" y1="298" x2="505" y2="710" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="515" y="502" text-anchor="start" fill="#0F6E56">экология сохранена</text>

<rect x="230" y="40" width="260" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text class="t" x="360" y="65" text-anchor="middle" fill="#26215C">Инженерный фаг</text>
<text class="ts" x="360" y="83" text-anchor="middle" fill="#534AB7">несёт CRISPR-Cas и гид-РНК</text>

<rect x="210" y="140" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text class="t" x="360" y="164" text-anchor="middle" fill="#2C2C2A">Распознавание налёта</text>
<text class="ts" x="360" y="182" text-anchor="middle" fill="#5F5E5A">по маркерам S. mutans</text>

<rect x="120" y="240" width="210" height="58" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text class="t" x="225" y="265" text-anchor="middle" fill="#4A1B0C">S. mutans</text>
<text class="ts" x="225" y="283" text-anchor="middle" fill="#993C1D">кариесогенный патоген</text>

<rect x="400" y="240" width="210" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="505" y="265" text-anchor="middle" fill="#04342C">Полезные бактерии</text>
<text class="ts" x="505" y="283" text-anchor="middle" fill="#0F6E56">фаг их не заражает</text>

<rect x="120" y="332" width="210" height="58" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text class="t" x="225" y="357" text-anchor="middle" fill="#4A1B0C">Впрыск CRISPR-системы</text>
<text class="ts" x="225" y="375" text-anchor="middle" fill="#993C1D">только внутрь мишени</text>

<rect x="120" y="424" width="210" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text class="t" x="225" y="452" text-anchor="middle" fill="#4A1B0C">Поиск гена-мишени</text>
<text class="ts" x="225" y="470" text-anchor="middle" fill="#993C1D">уникален для S. mutans</text>

<rect x="120" y="522" width="210" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text class="t" x="225" y="550" text-anchor="middle" fill="#4A1B0C">Cas разрезает геном</text>
<text class="ts" x="225" y="568" text-anchor="middle" fill="#993C1D">летальный разрыв ДНК</text>

<rect x="120" y="620" width="210" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text class="t" x="225" y="653" text-anchor="middle" fill="#4A1B0C">Гибель только патогена</text>

<rect x="160" y="712" width="360" height="64" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="740" text-anchor="middle" fill="#04342C">Микробиом сбалансирован</text>
<text class="ts" x="340" y="758" text-anchor="middle" fill="#085041">меньше кислоты — эмаль не деминерализуется</text>
</svg>
