<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 398" role="img">
<title>Dentition — карта контекстов (DDD context map)</title>
<desc>Два ограниченных контекста — Human Dentition и Arctic Shark Dentition — с общим ядром (минерализованная ткань) и переносом возможности непрерывного замещения зубов в человека через USAG-1.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="398" fill="#FFFFFF"/>
<text class="ttl" x="340" y="30" text-anchor="middle" fill="#26215C">Dentition — context map (DDD)</text>

<line x1="505" y1="58" x2="178" y2="70" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowp)"/>
<text class="ts" x="340" y="50" text-anchor="middle" fill="#534AB7">USAG-1: перенос Polyphyodont → человек</text>

<rect x="40" y="70" width="270" height="190" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text class="t" x="175" y="96" text-anchor="middle" fill="#2C2C2A">Human Dentition</text>
<text class="ts" x="58" y="128" fill="#5F5E5A">• Aggregate root: Dentition</text>
<text class="ts" x="58" y="152" fill="#5F5E5A">• Entity: Tooth — 32, FDI-id</text>
<text class="ts" x="58" y="176" fill="#5F5E5A">• Policy: Diphyodont (2 набора)</text>
<text class="ts" x="58" y="200" fill="#5F5E5A">• Invariant: нет 3-го набора</text>
<text class="ts" x="58" y="224" fill="#5F5E5A">• Эмаль не чинится сама</text>

<rect x="370" y="70" width="270" height="190" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text class="t" x="505" y="96" text-anchor="middle" fill="#2C2C2A">Arctic Shark Dentition</text>
<text class="ts" x="388" y="128" fill="#5F5E5A">• Aggregate root: Jaw</text>
<text class="ts" x="388" y="152" fill="#5F5E5A">• Entity: ToothRow, Tooth</text>
<text class="ts" x="388" y="176" fill="#5F5E5A">• Policy: Polyphyodont (∞)</text>
<text class="ts" x="388" y="200" fill="#5F5E5A">• Invariant: режущий край цел</text>
<text class="ts" x="388" y="224" fill="#5F5E5A">• Зуб = плакоидная чешуя</text>

<line x1="175" y1="260" x2="298" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="505" y1="260" x2="382" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="300" width="280" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="326" text-anchor="middle" fill="#04342C">Shared Kernel</text>
<text class="ts" x="340" y="344" text-anchor="middle" fill="#0F6E56">дентин, гидроксиапатит</text>
</svg>
