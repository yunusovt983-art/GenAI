<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 354" role="img">
<title>Хрусталик: факторы старения у человека и их смягчение у акулы</title>
<desc>Четыре фактора старения хрусталика человека — окисление, гликирование, агрегация кристаллинов, УФ — и как каждый из них смягчён у гренландской акулы: холод, низкий метаболизм, стабильные кристаллины с шаперонами, глубина без ультрафиолета.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrowg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="354" fill="#FFFFFF"/>
<text class="ttl" x="340" y="28" text-anchor="middle" fill="#2C2C2A">Хрусталик: почему у акулы он держится веками</text>

<text class="t" x="175" y="56" text-anchor="middle" fill="#993C1D">Человек: 4 фактора старения</text>
<text class="t" x="505" y="56" text-anchor="middle" fill="#0F6E56">Акула: каждый смягчён</text>

<line x1="312" y1="99" x2="368" y2="99" stroke="#888780" stroke-width="1.5" marker-end="url(#arrowg)"/>
<line x1="312" y1="163" x2="368" y2="163" stroke="#888780" stroke-width="1.5" marker-end="url(#arrowg)"/>
<line x1="312" y1="227" x2="368" y2="227" stroke="#888780" stroke-width="1.5" marker-end="url(#arrowg)"/>
<line x1="312" y1="291" x2="368" y2="291" stroke="#888780" stroke-width="1.5" marker-end="url(#arrowg)"/>

<rect x="40" y="72" width="270" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="175" y="103" text-anchor="middle" fill="#4A1B0C">1 · Окисление белков</text>
<rect x="40" y="136" width="270" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="175" y="167" text-anchor="middle" fill="#4A1B0C">2 · Гликирование (сахар)</text>
<rect x="40" y="200" width="270" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="175" y="231" text-anchor="middle" fill="#4A1B0C">3 · Агрегация кристаллинов</text>
<rect x="40" y="264" width="270" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="175" y="295" text-anchor="middle" fill="#4A1B0C">4 · УФ-излучение</text>

<rect x="370" y="72" width="270" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="505" y="103" text-anchor="middle" fill="#04342C">Холод −1…+4°C → реакции медленнее</text>
<rect x="370" y="136" width="270" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="505" y="167" text-anchor="middle" fill="#04342C">Низкий метаболизм → меньше ROS</text>
<rect x="370" y="200" width="270" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="505" y="231" text-anchor="middle" fill="#04342C">Стабильные кристаллины + шапероны</text>
<rect x="370" y="264" width="270" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="505" y="295" text-anchor="middle" fill="#04342C">Глубина → УФ почти нет</text>
</svg>
