<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 390" role="img">
<title>Две тактики на компонент: сохранять vs заменять</title>
<desc>Паттерн Longevity by Design выбирает тактику под компонент: хрусталик сохраняется как zero-maintenance, зубы постоянно заменяются как continuous regeneration; обе тактики дают сверхдолгий срок службы.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="390" fill="#FFFFFF"/>
<text class="ttl" x="340" y="28" text-anchor="middle" fill="#26215C">Две тактики на компонент: сохранять vs заменять</text>

<line x1="320" y1="106" x2="200" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="106" x2="480" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="190" x2="180" y2="214" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="190" x2="500" y2="214" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="276" x2="300" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="276" x2="380" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="250" y="56" width="180" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text class="t" x="340" y="86" text-anchor="middle" fill="#26215C">Longevity by Design</text>

<rect x="60" y="140" width="240" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text class="t" x="180" y="170" text-anchor="middle" fill="#2C2C2A">Хрусталик (lens)</text>
<rect x="380" y="140" width="240" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text class="t" x="500" y="170" text-anchor="middle" fill="#2C2C2A">Зубы (teeth)</text>

<rect x="60" y="214" width="240" height="62" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="180" y="240" text-anchor="middle" fill="#04342C">Preserve</text>
<text class="ts" x="180" y="258" text-anchor="middle" fill="#0F6E56">Zero-Maintenance: не заменять</text>
<rect x="380" y="214" width="240" height="62" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
<text class="t" x="500" y="240" text-anchor="middle" fill="#042C53">Replace</text>
<text class="ts" x="500" y="258" text-anchor="middle" fill="#185FA5">Continuous Regeneration</text>

<rect x="200" y="300" width="280" height="54" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="326" text-anchor="middle" fill="#04342C">Сверхдолгий срок службы</text>
<text class="ts" x="340" y="344" text-anchor="middle" fill="#085041">долговечность функции, не объекта</text>
</svg>
