<line x1="420" y1="196" x2="468" y2="196" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="345" y1="222" x2="345" y2="288" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="258" fill="#854F0B">emits</text>

<rect x="40" y="80" width="180" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
