<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 406" role="img">
<title>Human Dentition — DDD-агрегат</title>
<desc>Тактическая DDD-модель зубов человека: aggregate root Dentition, entity Tooth и Pulp, value objects, domain events и policy Diphyodont с инвариантом отсутствия третьего набора.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="406" fill="#FFFFFF"/>
<text class="ttl" x="340" y="28" text-anchor="middle" fill="#26215C">Human Dentition — DDD-агрегат</text>

<rect x="40" y="40" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7"/><text class="ts" x="60" y="51" fill="#5F5E5A">Aggregate</text>
