<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 506" role="img">
<title>P11-4: путь пептида от нанесения до нового слоя эмали</title>
<desc>Каскад реминерализации: нанесение раствора пептида, самосборка каркаса, нуклеация кристаллов, рост минерала и формирование нового слоя эмали.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="506" fill="#FFFFFF"/>
<text class="ttl" x="340" y="32" text-anchor="middle" fill="#04342C">P11-4: от нанесения до новой эмали</text>

<line x1="340" y1="114" x2="340" y2="146" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="206" x2="340" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="298" x2="340" y2="330" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="390" x2="340" y2="422" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="56" width="280" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="81" text-anchor="middle" fill="#04342C">Нанесение раствора</text>
<text class="ts" x="340" y="99" text-anchor="middle" fill="#0F6E56">мономерный пептид входит в поры</text>

<rect x="200" y="148" width="280" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="173" text-anchor="middle" fill="#04342C">Самосборка каркаса</text>
<text class="ts" x="340" y="191" text-anchor="middle" fill="#0F6E56">β-листы → волокнистый гель</text>

<rect x="200" y="240" width="280" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="265" text-anchor="middle" fill="#04342C">Нуклеация</text>
<text class="ts" x="340" y="283" text-anchor="middle" fill="#0F6E56">каркас связывает Ca²⁺ и PO₄³⁻</text>

<rect x="200" y="332" width="280" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="357" text-anchor="middle" fill="#04342C">Рост минерала</text>
<text class="ts" x="340" y="375" text-anchor="middle" fill="#0F6E56">нарастает гидроксиапатит</text>

<rect x="200" y="424" width="280" height="58" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
<text class="t" x="340" y="449" text-anchor="middle" fill="#04342C">Новый слой эмали</text>
<text class="ts" x="340" y="467" text-anchor="middle" fill="#085041">реминерализация завершена</text>
</svg>
