<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 366" role="img">
<title>Две стратегии против старения: ремонт vs замедление</title>
<desc>Слева репарационная модель медицины: повреждение, диагностика, лечение, частичное восстановление. Справа стратегия гренландской акулы: минимум повреждений в единицу времени, минимум накопления дефектов, минимум потребности в ремонте, сверхдолгий цикл.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.ttl{font-size:16px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="366" fill="#FFFFFF"/>
<text class="ttl" x="340" y="28" text-anchor="middle" fill="#2C2C2A">Две стратегии: ремонт vs замедление</text>

<text class="t" x="180" y="56" text-anchor="middle" fill="#993C1D">Repair model — медицина</text>
<text class="t" x="500" y="56" text-anchor="middle" fill="#0F6E56">Longevity by design — акула</text>

<line x1="180" y1="120" x2="180" y2="142" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="190" x2="180" y2="212" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="260" x2="180" y2="282" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="120" x2="500" y2="142" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="190" x2="500" y2="212" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="260" x2="500" y2="282" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="72" width="240" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="180" y="101" text-anchor="middle" fill="#4A1B0C">Повреждение</text>
<rect x="60" y="142" width="240" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="180" y="171" text-anchor="middle" fill="#4A1B0C">Диагностика</text>
<rect x="60" y="212" width="240" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="180" y="241" text-anchor="middle" fill="#4A1B0C">Лечение</text>
<rect x="60" y="282" width="240" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/><text class="t" x="180" y="311" text-anchor="middle" fill="#4A1B0C">Частичное восстановление</text>

<rect x="380" y="72" width="240" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="500" y="101" text-anchor="middle" fill="#04342C">Минимум повреждений / ед. t</text>
<rect x="380" y="142" width="240" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="500" y="171" text-anchor="middle" fill="#04342C">Минимум накопления дефектов</text>
<rect x="380" y="212" width="240" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="500" y="241" text-anchor="middle" fill="#04342C">Минимум потребности в ремонте</text>
<rect x="380" y="282" width="240" height="48" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/><text class="t" x="500" y="311" text-anchor="middle" fill="#04342C">Сверхдолгий жизненный цикл</text>
</svg>
